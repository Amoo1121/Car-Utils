services:
  car-utils-server:
    build:
      context: ./server
    container_name: car-utils-server
    restart: unless-stopped
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
      CAR_UTILS_DB_PATH: /app/data/car-utils.sqlite
      CORS_ORIGIN: "*"
    ports:
      - "3001:3001"
    volumes:
      - car-utils-sqlite:/app/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3001/api/health').then(response => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  car-utils-sqlite:
